<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" role="img" aria-label="消融实验">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf2ff"/>
      <stop offset="100%" stop-color="#e9f8f4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b8c8dc" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect x="6%" y="9%" width="88%" height="82%" rx="28" fill="#ffffff" stroke="#b9c7d8" stroke-width="3" stroke-dasharray="12 10"/>
  <circle cx="50%" cy="40%" r="52" fill="#2474ff" opacity="0.10"/>
  <path d="M 1800 0" fill="none"/>
  <g transform="translate(1800, 900)"></g>
  <text x="50%" y="43%" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="36" font-weight="700" fill="#172033">消融实验</text>
  <text x="50%" y="53%" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" fill="#667085">原始方法 → ROI → 平滑 → 列惩罚 → 完整方法</text>
  <text x="50%" y="64%" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#2474ff">请用同名图片替换此占位图</text>
</svg>
